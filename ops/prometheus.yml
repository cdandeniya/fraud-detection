# Scrapes the app's /actuator/prometheus endpoint.
# host.docker.internal points at the app when you run it on your machine (docker desktop).
# If you run the app inside compose instead, change the target to scorer:8080.
global:
  scrape_interval: 5s

scrape_configs:
  - job_name: fraud-detection
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8080']
