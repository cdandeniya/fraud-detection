# Tests run against an in-memory H2 database so they don't need Postgres running.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Kafka bits for tests - don't try to reach a broker
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=fraud-scorer
spring.kafka.listener.auto-startup=false
fraud.simulator.enabled=false
fraud.kafka.create-topics=false
fraud.kafka.topics.transactions=transactions
fraud.kafka.topics.alerts=fraud-alerts

# model rule off in tests - no model service running
fraud.model.enabled=false
fraud.model.url=http://localhost:8000
