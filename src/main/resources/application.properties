spring.application.name=fraud-detection

# Postgres - start it first with: docker compose up -d
spring.datasource.url=jdbc:postgresql://localhost:5432/fraud
spring.datasource.username=fraud
spring.datasource.password=fraud

# let hibernate create/update the tables for now (fine for a dev project)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# rules config - tune without recompiling
fraud.rules.high-amount-threshold=1000

# Redis - feature store for real-time per-card velocity
spring.data.redis.host=localhost
spring.data.redis.port=6379

# velocity rule: flag more than N transactions per 5 minutes on one card
fraud.rules.velocity.max-per-5-min=5

# Kafka - the pipeline's ingest queue
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=fraud-scorer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.cdandeniya.fraud.messaging
spring.kafka.consumer.properties.spring.json.value.default.type=com.cdandeniya.fraud.messaging.TransactionMessage

fraud.kafka.topics.transactions=transactions
fraud.kafka.topics.alerts=fraud-alerts
fraud.kafka.create-topics=true
# consumer threads per instance (up to the number of partitions)
fraud.kafka.concurrency=3

# simulator that feeds fake transactions into kafka (turn off if you only want the REST endpoint)
fraud.simulator.enabled=true
fraud.simulator.interval-ms=1000

# ML model service (Python). enabled=false runs on rules only.
fraud.model.enabled=true
fraud.model.url=http://localhost:8000
fraud.model.threshold=0.7
