spring.application.name=fraud-detection

# Postgres - start it first with: docker compose up -d
spring.datasource.url=jdbc:postgresql://localhost:5432/fraud
spring.datasource.username=fraud
spring.datasource.password=fraud

# let hibernate create/update the tables for now (fine for a dev project)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# rules config - tune without recompiling
fraud.rules.high-amount-threshold=1000
