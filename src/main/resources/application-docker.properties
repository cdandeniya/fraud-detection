# Config for running inside docker-compose, where the other services are reachable
# by their compose service names instead of localhost.
spring.datasource.url=jdbc:postgresql://db:5432/fraud
spring.data.redis.host=redis
spring.kafka.bootstrap-servers=kafka:29092

# each scorer instance runs a single thread; scaling instances is what splits the
# partitions across the group (that's the whole point of this stage)
fraud.kafka.concurrency=1

# the simulator is run by the dedicated "producer" service, not the scorers
fraud.simulator.enabled=false
fraud.kafka.create-topics=true
