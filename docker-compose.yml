# Postgres + Redis. Stage 3 will add Kafka here too.
services:
  db:
    image: postgres:16
    container_name: fraud-postgres
    environment:
      POSTGRES_DB: fraud
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: fraud-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
